version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: classicmodels
    ports:
      - "5433:5432"
    volumes:
      - ../sql/seed.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=classicmodels
      - DB_USER=postgres
      - DB_PASSWORD=password
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs
